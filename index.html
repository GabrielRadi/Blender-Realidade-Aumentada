<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>blender é dificil fml</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <!-- include ar.js for A-Frame -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>
  <style>
    #controls { display: none; position: fixed; z-index: 999; bottom: 20px; left: 0; }
    #controls.visible { display: block; }
  </style>
</head>
<body style='margin: 0px; overflow: hidden;'>
  <a-scene embedded arjs>

    <a-assets>
      <a-asset-item id="gravity_destroyer" src="./gravity_destroyer_-_beyblade_metal_masters.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro">
      <a-entity id="model3" gltf-model="#gravity_destroyer" rotation="0 0 0" scale="25 25 25" animation="property: rotation; to: 0 360 0; dur: 200; easing: linear; loop: true"></a-entity>
    </a-marker>

    <a-marker preset="kanji">
      <a-entity rotation="-90 0 0" beyblade-battle>
        <a-entity id="gravity1" gltf-model="#gravity_destroyer" position="-2 0 0" rotation="0 0 0" scale="25 25 25" animation="property: rotation; to: 0 360 0; dur: 200; easing: linear; loop: true"></a-entity>
        <a-entity id="gravity2" gltf-model="#gravity_destroyer" position="2 0 0" rotation="0 0 0" scale="25 25 25" animation="property: rotation; to: 0 360 0; dur: 200; easing: linear; loop: true"></a-entity>
      </a-entity>
    </a-marker>

    <a-marker preset="arjs">
      <a-entity id="model3" gltf-model="#gravity_destroyer" rotation="0 0 0" scale="25 25 25" animation="property: rotation; to: 0 360 0; dur: 200; easing: linear; loop: true"></a-entity>
    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

  <div id="controls">
    <div id="active-marker-label">—</div>
    <!-- Escala -->
    <div>
      <span>Escala</span>
      <button onclick="changeScale(-0.1)">−</button>
      <span id="scaleVal">1.0</span>
      <button onclick="changeScale(0.1)">+</button>
    </div>
    <!-- Position X -->
    <div>
      <span>Pos X</span>
      <button onclick="changePos('x', -0.1)">−</button>
      <span id="posXVal">0.0</span>
      <button onclick="changePos('x', 0.1)">+</button>
    </div>
    <!-- Position Y -->
    <div>
      <span>Pos Y</span>
      <button onclick="changePos('y', -0.1)">−</button>
      <span id="posYVal">0.0</span>
      <button onclick="changePos('y', 0.1)">+</button>
    </div>
    <!-- Position Z -->
    <div>
      <span>Pos Z</span>
      <button onclick="changePos('z', -0.1)">−</button>
      <span id="posZVal">0.0</span>
      <button onclick="changePos('z', 0.1)">+</button>
    </div>
    <!-- Rotation X -->
    <div>
      <span>Rot X</span>
      <button onclick="changeRot('x', -15)">−</button>
      <span id="rotXVal">-90</span>
      <button onclick="changeRot('x', 15)">+</button>
    </div>
    <!-- Rotation Y -->
    <div>
      <span>Rot Y</span>
      <button onclick="changeRot('y', -15)">−</button>
      <span id="rotYVal">0</span>
      <button onclick="changeRot('y', 15)">+</button>
    </div>
    <!-- Rotation Z -->
    <div>
      <span>Rot Z</span>
      <button onclick="changeRot('z', -15)">−</button>
      <span id="rotZVal">0</span>
      <button onclick="changeRot('z', 15)">+</button>
    </div>
  </div>

  <script>
    const controls = document.getElementById('controls');
    const activeMarkerLabel = document.getElementById('active-marker-label');

    // Register the beyblade battle component
    AFRAME.registerComponent('beyblade-battle', {
      init: function() {
        this.gravity1 = this.el.querySelector('#gravity1');
        this.gravity2 = this.el.querySelector('#gravity2');
        this.phase = 0; // 0: moving, 1: clashing, 2: burst, 3: reset
        this.timer = 0;
        this.fadeTarget = null;
        this.startPos1 = new THREE.Vector3(-2, 0, 0);
        this.startPos2 = new THREE.Vector3(2, 0, 0);
        this.pos1 = this.startPos1.clone();
        this.pos2 = this.startPos2.clone();
        this.active = false;
        this.dist1 = 2; // distance to center
        this.dist2 = 2;
        // Set initial positions
        if (this.gravity1) this.gravity1.setAttribute('position', `${this.pos1.x} ${this.pos1.y} ${this.pos1.z}`);
        if (this.gravity2) this.gravity2.setAttribute('position', `${this.pos2.x} ${this.pos2.y} ${this.pos2.z}`);
      },
      tick: function(time, delta) {
        if (!this.active) return;
        if (!this.gravity1) this.gravity1 = this.el.querySelector('#gravity1');
        if (!this.gravity2) this.gravity2 = this.el.querySelector('#gravity2');
        if (!this.gravity1 || !this.gravity2) return;
        this.timer += delta / 1000; // seconds
        if (this.phase === 0) { // moving - spiraling toward center
          const speed = 4; // angular speed
          const radiusDecay = 0.5; // how fast radius decreases
          const radius1 = Math.max(0.1, 2 - this.timer * radiusDecay);
          const radius2 = Math.max(0.1, 2 - this.timer * radiusDecay);
          const angle1 = Math.PI + this.timer * speed + Math.sin(this.timer * 1.5) * 0.3; // chaotic
          const angle2 = 0 + this.timer * speed + Math.cos(this.timer * 1.5) * 0.3;
          this.pos1.set(Math.cos(angle1) * radius1, 0, Math.sin(angle1) * radius1);
          this.pos2.set(Math.cos(angle2) * radius2, 0, Math.sin(angle2) * radius2);
          this.gravity1.setAttribute('position', `${this.pos1.x} ${this.pos1.y} ${this.pos1.z}`);
          this.gravity2.setAttribute('position', `${this.pos2.x} ${this.pos2.y} ${this.pos2.z}`);
          // Collision check
          if (this.pos1.distanceTo(this.pos2) < 1.0) { // clash threshold
            this.phase = 1;
            this.timer = 0;
          }
        } else if (this.phase === 1) { // clashing
          if (this.timer > 1) {
            if (Math.random() < 0.2) { // 20% chance
              this.fadeTarget = Math.random() < 0.5 ? this.gravity1 : this.gravity2;
              this.phase = 2;
            } else {
              this.phase = 3;
            }
            this.timer = 0;
          }
        } else if (this.phase === 2) { // burst
          const opacity = Math.max(0, 1 - this.timer * 2);
          this.fadeTarget.setAttribute('material', `opacity: ${opacity}; transparent: true`);
          if (opacity <= 0) {
            this.phase = 3;
            this.timer = 0;
          }
        } else if (this.phase === 3) { // reset
          if (this.timer > 3) {
            this.pos1.copy(this.startPos1);
            this.pos2.copy(this.startPos2);
            this.gravity1.setAttribute('position', `${this.pos1.x} ${this.pos1.y} ${this.pos1.z}`);
            this.gravity2.setAttribute('position', `${this.pos2.x} ${this.pos2.y} ${this.pos2.z}`);
            this.gravity1.setAttribute('material', 'opacity: 1; transparent: false');
            this.gravity2.setAttribute('material', 'opacity: 1; transparent: false');
            this.phase = 0;
            this.timer = 0;
            this.fadeTarget = null;
          }
        }
      }
    });

    // Cada marcador tem seu próprio modelo e estado independente
    const markerConfig = [
      {
        name: 'ARJS (midasreal_steel.glb)',
        el: document.querySelector('[preset="arjs"]'),
        model: document.getElementById('model1'),
        state: { scale: 1.0, pos: { x: 0, y: 0, z: 0 }, rot: { x: -90, y: 0, z: 0 } }
      },
      {
        name: 'Kanji (gravity_destroyer x2)',
        el: document.querySelector('[preset="kanji"]'),
        model: document.getElementById('gravity1'),
        state: { scale: 25, pos: { x: -2, y: 0, z: 0 }, rot: { x: 0, y: 0, z: 0 } }
      },
      {
        name: 'Hiro (gravity_destroyer_-_beyblade_metal_masters.glb)',
        el: document.querySelector('[preset="hiro"]'),
        model: document.getElementById('model3'),
        state: { scale: 25, pos: { x: 0, y: 0, z: 0 }, rot: { x: -90, y: 0, z: 0 } }
      }
    ];

    let activeMarker = null;

    markerConfig.forEach(m => {
      m.el.addEventListener('markerFound', () => {
        activeMarker = m;
        console.log(`[AR] markerFound: ${m.name}`);
        activeMarkerLabel.textContent = `Marcador ativo: ${m.name}`;
        syncDisplays(m.state);
        controls.classList.add('visible');
      });

      m.el.addEventListener('markerLost', () => {
        console.log(`[AR] markerLost: ${m.name}`);
        if (activeMarker === m) {
          activeMarker = null;
          controls.classList.remove('visible');
        }
      });
    });

    // Add animation-mixer after models are loaded
    const mixers = [];
    const models = ['model1', 'gravity1', 'gravity2', 'model3'];
    models.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('model-loaded', (event) => {
        const gltfComp = el.components['gltf-model'];
        const modelObject = (event.detail && event.detail.model) || (gltfComp && gltfComp.model) || el.getObject3D('mesh');
        const gltf = gltfComp && (gltfComp.gltf || gltfComp.gltfData || (modelObject && modelObject.userData && modelObject.userData.gltf));
        const animations = (gltf && gltf.animations) || (modelObject && modelObject.animations);
        if (animations && animations.length > 0) {
          const sceneObject = (gltf && gltf.scene) || modelObject;
          const mixer = new THREE.AnimationMixer(sceneObject);
          const action = mixer.clipAction(animations[0]);
          action.play();
          el.mixer = mixer;
          mixers.push(mixer);
        }
      });
    });
    const sceneEl = document.querySelector('a-scene');
    if (sceneEl) {
      sceneEl.addEventListener('tick', (evt) => {
        mixers.forEach(mixer => mixer.update(evt.delta / 1000));
      });
    }

    // Atualiza todos os displays com o estado do marcador ativo
    function syncDisplays(state) {
      document.getElementById('scaleVal').textContent = state.scale.toFixed(1);
      document.getElementById('posXVal').textContent  = state.pos.x.toFixed(1);
      document.getElementById('posYVal').textContent  = state.pos.y.toFixed(1);
      document.getElementById('posZVal').textContent  = state.pos.z.toFixed(1);
      document.getElementById('rotXVal').textContent  = state.rot.x;
      document.getElementById('rotYVal').textContent  = state.rot.y;
      document.getElementById('rotZVal').textContent  = state.rot.z;
    }

    function changeScale(delta) {
      if (!activeMarker) return;
      const s = activeMarker.state;
      s.scale = Math.max(0.1, parseFloat((s.scale + delta).toFixed(1)));
      activeMarker.model.setAttribute('scale', `${s.scale} ${s.scale} ${s.scale}`);
      document.getElementById('scaleVal').textContent = s.scale.toFixed(1);
    }

    function changePos(axis, delta) {
      if (!activeMarker) return;
      const p = activeMarker.state.pos;
      p[axis] = parseFloat((p[axis] + delta).toFixed(1));
      activeMarker.model.setAttribute('position', `${p.x} ${p.y} ${p.z}`);
      document.getElementById(`pos${axis.toUpperCase()}Val`).textContent = p[axis].toFixed(1);
    }

    function changeRot(axis, delta) {
      if (!activeMarker) return;
      const r = activeMarker.state.rot;
      r[axis] = (r[axis] + delta) % 360;
      activeMarker.model.setAttribute('rotation', `${r.x} ${r.y} ${r.z}`);
      document.getElementById(`rot${axis.toUpperCase()}Val`).textContent = r[axis];
    }

    // Battle activation on marker found/lost
    markerConfig.forEach(m => {
      if (m.name.includes('Kanji')) {
        m.el.addEventListener('markerFound', () => {
          const battleEntity = m.el.querySelector('[beyblade-battle]');
          const comp = battleEntity && battleEntity.components['beyblade-battle'];
          if (comp) {
            comp.active = true;
            comp.phase = 0;
            comp.timer = 0;
            comp.fadeTarget = null;
          }
        });
        m.el.addEventListener('markerLost', () => {
          const battleEntity = m.el.querySelector('[beyblade-battle]');
          const comp = battleEntity && battleEntity.components['beyblade-battle'];
          if (comp) {
            comp.active = false;
            // Reset positions and opacity
            comp.pos1.copy(comp.startPos1);
            comp.pos2.copy(comp.startPos2);
            if (comp.gravity1) {
              comp.gravity1.setAttribute('position', `${comp.pos1.x} ${comp.pos1.y} ${comp.pos1.z}`);
              comp.gravity1.setAttribute('material', 'opacity: 1; transparent: false');
            }
            if (comp.gravity2) {
              comp.gravity2.setAttribute('position', `${comp.pos2.x} ${comp.pos2.y} ${comp.pos2.z}`);
              comp.gravity2.setAttribute('material', 'opacity: 1; transparent: false');
            }
          }
        });
      }
    });

    // Beyblade battle animation active on Kanji marker
  </script>
</body>
</html>
